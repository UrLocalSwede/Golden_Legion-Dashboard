<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Golden Legion Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        h1, h2 {
            text-align: center;
        }
        #guild-info {
            text-align: center;
            margin-bottom: 20px;
        }
        #members {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .member-card {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            width: 120px;
            text-align: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }
        .member-name {
            font-weight: bold;
            margin-bottom: 3px;
        }
        .member-rank {
            font-size: 0.9em;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Golden Legion Dashboard</h1>
    <div id="guild-info">Loading guild info...</div>
    <div id="members"></div>

    <script>
        async function loadGuild() {
            const guildInfo = document.getElementById("guild-info");
            const membersDiv = document.getElementById("members");

            guildInfo.textContent = "Loading guild info...";
            membersDiv.innerHTML = "";

            try {
                const res = await fetch('/guild-members');

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const members = await res.json();

                if (!Array.isArray(members) || !members.length) {
                    guildInfo.textContent = "Guild not found or empty!";
                    return;
                }

                // Display basic guild info
                guildInfo.innerHTML = `
                    <h2>Golden Legion</h2>
                    <p><strong>Total Members:</strong> ${members.length}</p>
                `;

                // Display members safely
                membersDiv.innerHTML = members.map(member => {
                    if (!member) return '';
                    const rank = member.rank || "Member";
                    const name = member.username || member.uuid;
                    const onlineDot = member.online ? '<span style="color:green"> ●</span>' : '';
                    return `
                        <div class="member-card">
                            <div class="member-name">${name}${onlineDot}</div>
                            <div class="member-rank">${rank}</div>
                        </div>
                    `;
                }).join("");

            } catch (err) {
                console.error('Failed to load members:', err);
                guildInfo.textContent = "Error fetching guild members.";
            }
        }

        // Load on page load
        loadGuild();
        // Refresh every 2 minutes
        setInterval(loadGuild, 120000);
    </script>
</body>
</html>
